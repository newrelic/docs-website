[[plugins]]
package = "@netlify/plugin-gatsby"

[functions]
  included_files = ["!.cache/data/datastore/data.mdb","!.cache/query-engine"]

# Edge functions commented out to avoid costs
# Uncomment if country-based functionality is needed again
# [[edge_functions]]
#   function = "inject-country" # Matches the filename without .js
#   path = "/*" # Apply to all HTML pages served by Netlify


[[headers]]
for = "/*"

[headers.values]
Access-Control-Allow-Origin = "*"
Referrer-Policy="no-referrer-when-downgrade"
Content-Security-Policy="frame-ancestors *.newrelic.com"

[build.environment]
 NETLIFY_IMAGE_CDN = "true"

# ==============================================================================
# HTML PAGES — always revalidate so fresh content is served after deploys
# ==============================================================================
[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
 
# ==============================================================================
# JAVASCRIPT BUNDLES — cache forever (hash in filename guarantees uniqueness)
# ==============================================================================
[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
 
# ==============================================================================
# CSS FILES — cache forever (hash in filename guarantees uniqueness)
# ==============================================================================
[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
 
# ==============================================================================
# GATSBY PAGE-DATA — revalidate on each visit but serve stale while revalidating
# ==============================================================================
[[headers]]
  for = "/page-data/*"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
 
# ==============================================================================
# GATSBY STATIC FILES — cache for 1 year 
# ==============================================================================
[[headers]]
  for = "/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
 
# ==============================================================================
# IMAGES — cache for 7 days
# ==============================================================================
[[headers]]
  for = "*.gif"
  [headers.values]
    Cache-Control = "public, max-age=604800, s-maxage=604800"
 
[[headers]]
  for = "*.webp"
  [headers.values]
    Cache-Control = "public, max-age=604800, s-maxage=604800"
 
[[headers]]
  for = "*.png"
  [headers.values]
    Cache-Control = "public, max-age=604800, s-maxage=604800"
 
[[headers]]
  for = "*.jpg"
  [headers.values]
    Cache-Control = "public, max-age=604800, s-maxage=604800"
 
[[headers]]
  for = "*.svg"
  [headers.values]
    Cache-Control = "public, max-age=604800, s-maxage=604800"
 
# ==============================================================================
# FONTS — cache for 1 year (fonts never change without a new filename)
# ==============================================================================
[[headers]]
  for = "*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
 
[[headers]]
  for = "*.woff"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
 
[[headers]]
  for = "*.ttf"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
 
# ==============================================================================
# RSS / XML FEEDS — cache for 1 hour, then revalidate
# ==============================================================================
[[headers]]
  for = "/*.xml"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=3600, stale-while-revalidate=86400"
 
# ==============================================================================
# ATTRIBUTE DICTIONARY — cache HTML for 1 hour across all locales
# ==============================================================================
[[headers]]
  for = "/attribute-dictionary/"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400, stale-while-revalidate=86400"
 
[[headers]]
  for = "/*/attribute-dictionary/"
  [headers.values]
    Cache-Control = "public, max-age=3600, s-maxage=86400, stale-while-revalidate=86400"