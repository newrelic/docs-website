name: Trigger i18n merge

on:
  workflow_dispatch:
    inputs:
      locale:
        description: 'Locale to merge (es, jp, kr, fr, pt) or leave empty for all'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - es
          - jp
          - kr
          - fr
          - pt
  pull_request:
    branches:
      - main
    types:
      - closed

jobs:
  merge-main-i18n-branches:
    name: Merge main to i18n branches
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' || github.event.pull_request.merged == true
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: 22.4

      - name: Cache dependencies
        id: yarn-cache
        uses: actions/cache@v3
        with:
          path: '**/node_modules'
          key: ${{ runner.os }}-node-modules-${{ hashFiles('**/yarn.lock') }}

      - name: Install dependencies
        if: steps.yarn-cache.outputs.cache-hit != 'true'
        run: yarn install --frozen-lockfile

      - name: Check for modified files & merge
        env:
          GITHUB_TOKEN: ${{ secrets.DOCS_ENG_BOT_TOKEN }}
          SOURCE_REF: refs/heads/main
        run: |
          if [ "${{ github.event_name }}" == "workflow_dispatch" ]; then
            # Manual trigger - merge specific locale or all locales
            if [ -n "${{ inputs.locale }}" ]; then
              echo "Manually merging main to main-${{ inputs.locale }}"
              yarn trigger-i18n-merge -l ${{ inputs.locale }}
            else
              echo "Manually merging main to all locale branches"
              for locale in es jp kr fr pt; do
                yarn trigger-i18n-merge -l $locale
              done
            fi
          else
            # PR trigger - check modified files
            URL="https://api.github.com/repos/${GITHUB_REPOSITORY}/pulls/${{ github.event.pull_request.number }}/files"
            yarn trigger-i18n-merge -u $URL
          fi
