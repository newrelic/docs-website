name: Upload Agent Release Notes Metadata

on:
  push:
    branches:
      - main
    paths:
      - 'src/content/docs/release-notes/**/*.mdx'

  workflow_dispatch:
    inputs:
      commit-sha:
        description: 'Commit SHA to process (optional, defaults to HEAD)'
        required: false
        type: string
      dry-run:
        description: 'Validate metadata without uploading'
        required: false
        type: boolean
        default: false

jobs:
  upload-metadata:
    name: Upload Release Notes Metadata to NewRelic
    runs-on: ubuntu-latest
    timeout-minutes: 15

    if: github.event.pull_request.head.repo.full_name == github.repository || github.event_name != 'pull_request'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3
        with:
          fetch-depth: 10
          ref: ${{ github.event.inputs.commit-sha || github.sha }}

      - name: Dry run - Show files to process
        if: ${{ inputs.dry-run }}
        run: |
          echo "::notice::Dry run mode - no metadata will be uploaded"
          echo "Files that would be processed:"
          git diff --name-only HEAD~1 HEAD | grep 'src/content/docs/release-notes/.*\.mdx$' || echo "No release notes changed"

      - name: Upload agent metadata
        if: ${{ !inputs.dry-run }}
        uses: newrelic/agent-metadata-action@v1
        with:
          newrelic-client-id: ${{ secrets.NEWRELIC_CLIENT_ID }}
          newrelic-private-key: ${{ secrets.NEWRELIC_PRIVATE_KEY }}
          fetch-depth: '10'
          newrelic-license-key: ${{ secrets.APM_CONTROL_NR_LICENSE_KEY }}

